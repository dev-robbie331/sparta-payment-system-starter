<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/default :: head('홈')}" />
    <style>
        .hero-gradient-animate {
            background: linear-gradient(-45deg, #1a1a1a, #2d2d2d, #1a1a1a, #0f0f0f);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero-noise {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        .product-card .card-img {
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .product-card:hover .card-img {
            transform: scale(1.08);
        }
        .product-card .card-overlay {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .product-card:hover .card-overlay {
            opacity: 1;
        }
        .product-card {
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .product-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }
        .product-card .card-info {
            transform: translateY(8px);
            transition: transform 0.3s ease;
        }
        .product-card:hover .card-info {
            transform: translateY(0);
        }
    </style>
</head>
<body class="font-sans bg-white text-sf-black min-h-screen flex flex-col">
    <th:block th:replace="~{layout/default :: header}" />

    <main class="flex-1">
        <div class="relative overflow-hidden bg-black text-white hero-gradient-animate hero-noise">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-14 md:py-20 relative z-10">
                <div class="flex items-center justify-between animate-fade-in">
                    <div>
                        <h1 class="text-4xl sm:text-5xl md:text-6xl font-black leading-[0.95] tracking-tighter">
                            나만의 스타일
                        </h1>
                        <p class="text-gray-400 text-sm md:text-base leading-relaxed max-w-md mt-4">
                            트렌디한 스트릿 스타일부터 클래식까지. 당신만의 패션 감각을 표현하세요.
                        </p>
                    </div>
                    <a href="#products" class="hidden sm:inline-flex items-center gap-3 px-8 py-4 bg-white text-black font-black text-sm uppercase tracking-wide hover:bg-gray-100 transition-all flex-shrink-0">
                        둘러보기 <i class="ri-arrow-right-line"></i>
                    </a>
                </div>
            </div>
        </div>

        <div id="products" class="max-w-7xl mx-auto px-4 sm:px-6 py-20">

            <div class="flex items-end justify-between mb-12">
                <div>
                    <h2 class="text-3xl md:text-4xl font-black text-gray-900 uppercase tracking-tight">신상품</h2>
                    <p class="text-xs text-gray-500 mt-3 font-semibold">
                        <span id="product-count" class="font-black text-gray-900">0</span> 개 상품
                    </p>
                </div>
            </div>

            <div id="product-loading" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                <div class="animate-fade-in" style="animation-delay:0.00s">
                    <div class="skeleton skeleton-img aspect-[3/4] rounded-lg mb-3"></div>
                    <div class="space-y-2">
                        <div class="skeleton skeleton-text w-2/3 h-3"></div>
                        <div class="skeleton skeleton-text-lg w-full h-4"></div>
                        <div class="skeleton skeleton-text w-1/2 h-3"></div>
                    </div>
                </div>
                <div class="animate-fade-in" style="animation-delay:0.05s">
                    <div class="skeleton skeleton-img aspect-[3/4] rounded-lg mb-3"></div>
                    <div class="space-y-2">
                        <div class="skeleton skeleton-text w-2/3 h-3"></div>
                        <div class="skeleton skeleton-text-lg w-full h-4"></div>
                        <div class="skeleton skeleton-text w-1/2 h-3"></div>
                    </div>
                </div>
                <div class="animate-fade-in" style="animation-delay:0.10s">
                    <div class="skeleton skeleton-img aspect-[3/4] rounded-lg mb-3"></div>
                    <div class="space-y-2">
                        <div class="skeleton skeleton-text w-2/3 h-3"></div>
                        <div class="skeleton skeleton-text-lg w-full h-4"></div>
                        <div class="skeleton skeleton-text w-1/2 h-3"></div>
                    </div>
                </div>
                <div class="animate-fade-in" style="animation-delay:0.15s">
                    <div class="skeleton skeleton-img aspect-[3/4] rounded-lg mb-3"></div>
                    <div class="space-y-2">
                        <div class="skeleton skeleton-text w-2/3 h-3"></div>
                        <div class="skeleton skeleton-text-lg w-full h-4"></div>
                        <div class="skeleton skeleton-text w-1/2 h-3"></div>
                    </div>
                </div>
            </div>

            <div id="product-empty" class="hidden text-center py-20 animate-fade-in">
                <i class="ri-inbox-2-line text-5xl text-gray-300 mb-4 inline-block"></i>
                <p class="text-gray-500 font-medium text-lg">상품이 없습니다</p>
                <p class="text-gray-400 text-sm mt-1">곧 새로운 상품이 입고됩니다</p>
            </div>

            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
        </div>
    </main>

    <th:block th:replace="~{layout/default :: footer}" />
    <th:block th:replace="~{layout/default :: scripts}" />

    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);

        async function loadProducts() {
            try {
                const products = await apiFetch('/api/products');
                document.getElementById('product-loading').classList.add('hidden');

                if (!products || products.length === 0) {
                    document.getElementById('product-empty').classList.remove('hidden');
                    return;
                }

                document.getElementById('product-count').textContent = products.length;

                const grid = document.getElementById('product-grid');
                grid.innerHTML = products.map((product, index) => {
                    const v = getProductVisual(product.name);
                    return `
                    <div class="product-card rounded-2xl overflow-hidden animate-fade-in" style="animation-delay: ${index * 0.05}s">
                        <a href="/products/${product.id}" class="block">
                            <div class="relative aspect-[3/4] bg-gradient-to-br ${v.bg}" style="overflow:hidden">
                                <div class="card-img w-full h-full flex items-center justify-center">
                                    <i class="${v.icon} text-6xl ${v.color}"></i>
                                </div>
                                <div class="card-overlay absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-transparent flex flex-col justify-end p-5">
                                    ${product.stock > 0
                                        ? `<button onclick="event.preventDefault(); addToCart(${product.id})"
                                            class="w-full py-3 bg-white text-black text-xs font-black uppercase tracking-wider rounded-full hover:bg-gray-100 transition-colors">
                                            담기
                                          </button>`
                                        : ''
                                    }
                                </div>
                                ${index < 3 ? '<span class="absolute top-3 left-3 text-[10px] font-black text-white bg-black/80 backdrop-blur-sm px-3 py-1.5 rounded-full">신상</span>' : ''}
                                ${product.stock <= 5 && product.stock > 0
                                    ? '<span class="absolute top-3 right-3 text-[10px] font-black text-white bg-red-500/90 backdrop-blur-sm px-3 py-1.5 rounded-full">마감임박</span>'
                                    : product.stock <= 0
                                    ? '<span class="absolute inset-0 flex items-center justify-center bg-white/80 backdrop-blur-sm"><span class="text-sm font-black text-gray-900 tracking-wider">품절</span></span>'
                                    : ''
                                }
                            </div>
                        </a>
                        <div class="card-info pt-4 px-1 pb-2">
                            <a href="/products/${product.id}" class="block">
                                <h3 class="text-sm font-semibold text-gray-900 line-clamp-1 leading-snug">${product.name}</h3>
                            </a>
                            <p class="mt-1 text-xs text-gray-400 line-clamp-1">${product.description || ''}</p>
                            <p class="mt-2 text-base font-bold text-gray-900">${formatPrice(product.price)}<span class="text-xs font-normal text-gray-400 ml-0.5">원</span></p>
                        </div>
                    </div>
                `}).join('');

            } catch (e) {
                document.getElementById('product-loading').classList.add('hidden');
                showToast('상품을 불러올 수 없습니다', 'danger');
            }
        }

        async function addToCart(productId) {
            if (!requireAuth()) return;
            try {
                await apiFetch('/api/cart/items', {
                    method: 'POST',
                    body: JSON.stringify({ productId: productId, quantity: 1 })
                });
                showToast('장바구니에 담았습니다', 'success');
                updateCartBadge();
            } catch (e) {
                showToast(e.message, 'danger');
            }
        }
    </script>
</body>
</html>
