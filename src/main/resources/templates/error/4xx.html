<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/default :: head('오류')}" />
</head>
<body class="font-sans bg-white text-sf-black min-h-screen flex flex-col">
    <th:block th:replace="~{layout/default :: header}" />

    <main class="flex-1">
        <div class="max-w-lg mx-auto px-4 sm:px-6 py-20 text-center">
            <div class="w-20 h-20 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="ri-error-warning-line text-4xl text-red-400"></i>
            </div>
            <h1 class="text-6xl font-extrabold text-gray-200" th:text="${status}">404</h1>
            <p class="text-lg font-semibold text-gray-900 mt-4">페이지를 찾을 수 없습니다</p>
            <p class="text-sm text-gray-500 mt-2" th:text="${error}">요청한 페이지가 존재하지 않습니다</p>
            <a th:href="@{/}" class="inline-flex items-center gap-2 mt-8 px-6 py-3 bg-sf-black hover:bg-sf-dark text-white font-semibold rounded-xl text-sm transition-colors">
                <i class="ri-home-line"></i> 홈으로 돌아가기
            </a>
        </div>
    </main>

    <th:block th:replace="~{layout/default :: footer}" />
    <th:block th:replace="~{layout/default :: scripts}" />
</body>
</html>
