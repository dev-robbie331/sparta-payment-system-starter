<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/default :: head('장바구니')}" />
</head>
<body class="font-sans bg-white text-sf-black min-h-screen flex flex-col">
    <th:block th:replace="~{layout/default :: header}" />

    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-8 py-16">

            <h1 class="text-5xl font-light text-gray-900 mb-12 tracking-widest uppercase letter-spacing-2">장바구니</h1>

            <div id="cart-loading" class="text-center py-24">
                <div class="spinner-dark mx-auto"></div>
            </div>

            <div id="cart-empty" class="hidden text-center py-32 animate-fade-in">
                <div class="w-24 h-24 mx-auto mb-8 flex items-center justify-center">
                    <i class="ri-shopping-bag-line text-6xl text-gray-200"></i>
                </div>
                <h2 class="text-2xl font-light text-gray-900 mb-3 tracking-tight">장바구니가 비어있습니다</h2>
                <p class="text-sm text-gray-500 mb-10">엄선된 프리미엄 패션 컬렉션을 둘러보세요</p>
                <a href="/" class="inline-block text-xs font-medium text-gray-900 border-b border-gray-400 hover:border-gray-900 pb-1 transition-all uppercase tracking-wider">
                    쇼핑 계속하기
                </a>
            </div>

            <div id="cart-content" class="hidden animate-fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <div class="lg:col-span-2">
                        <div class="flex items-center gap-3 pb-6 border-b border-gray-200 mb-2">
                            <input type="checkbox" id="select-all" checked onchange="toggleSelectAll()"
                                   class="w-5 h-5 accent-black cursor-pointer">
                            <label for="select-all" class="text-sm font-medium text-gray-900 cursor-pointer">전체 선택</label>
                            <span id="selected-count" class="text-xs text-gray-500 ml-auto"></span>
                        </div>
                        <div id="cart-items" class="space-y-8"></div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="sticky top-32">
                            <div class="bg-white border border-gray-200 p-8">
                                <h2 class="text-xs font-semibold text-gray-900 mb-8 uppercase tracking-widest">주문 요약</h2>

                                <div class="space-y-4 mb-8 pb-8 border-b border-gray-200">
                                    <div class="flex justify-between text-sm">
                                        <span class="text-gray-600">상품금액</span>
                                        <span id="cart-subtotal" class="text-gray-900">0</span>
                                    </div>
                                    <div class="flex justify-between text-sm">
                                        <span class="text-gray-600">배송비</span>
                                        <span class="text-gray-900">무료</span>
                                    </div>
                                </div>

                                <div class="flex justify-between mb-8">
                                    <span class="text-sm font-medium text-gray-900 uppercase tracking-wide">합계</span>
                                    <span class="text-xl font-light text-gray-900">
                                        <span id="cart-total">0</span>
                                    </span>
                                </div>

                                <a href="#" id="btn-order" onclick="goToCheckout(event)"
                                        class="block w-full bg-black hover:bg-gray-900 text-white font-light py-4 text-sm mb-4 transition-all duration-300 uppercase tracking-widest letter-spacing-1 text-center">
                                    주문하기
                                </a>
                                <a href="/" class="block text-center text-xs text-gray-500 hover:text-gray-900 transition-colors py-3 uppercase tracking-wider font-medium">
                                    쇼핑 계속하기
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout/default :: footer}" />
    <th:block th:replace="~{layout/default :: scripts}" />

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!requireAuth()) return;
            loadCart();
        });

        async function loadCart() {
            try {
                const items = await apiFetch('/api/cart/items');
                document.getElementById('cart-loading').classList.add('hidden');

                updateCartBadge(items);

                if (!items || items.length === 0) {
                    document.getElementById('cart-content').classList.add('hidden');
                    document.getElementById('cart-empty').classList.remove('hidden');
                    return;
                }

                renderCart(items);
                document.getElementById('cart-content').classList.remove('hidden');
            } catch (e) {
                document.getElementById('cart-loading').classList.add('hidden');
                showToast('장바구니를 불러올 수 없습니다', 'danger');
            }
        }

        let allCartItems = [];

        function renderCart(items) {
            allCartItems = items;
            const container = document.getElementById('cart-items');

            container.innerHTML = items.map(item => {
                const subtotal = item.price * item.quantity;
                return `
                <div id="cart-item-${item.id}" class="flex gap-8 py-8 border-b border-gray-200 last:border-0">
                    <div class="flex items-start pt-2">
                        <input type="checkbox" class="cart-checkbox w-5 h-5 accent-black cursor-pointer"
                               data-id="${item.id}" data-price="${item.price}" data-quantity="${item.quantity}"
                               checked onchange="updateSelection()">
                    </div>
                    <div class="w-32 h-40 rounded-sm flex-shrink-0 flex items-center justify-center border border-gray-200 bg-gradient-to-br ${getProductVisual(item.productName).bg}">
                        <i class="${getProductVisual(item.productName).icon} text-3xl ${getProductVisual(item.productName).color}"></i>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="text-sm font-medium text-gray-900 mb-2 tracking-tight">${item.productName}</h3>
                            <p class="text-xs text-gray-500 mb-6 font-mono">상품번호: ${item.id}</p>
                            <p class="text-base font-light text-gray-900 mb-auto">${formatPrice(item.price)}원</p>
                        </div>
                        <div class="flex items-center gap-6 mt-6">
                            <div class="flex items-center border border-gray-300">
                                <button onclick="changeQuantity(${item.id}, -1)" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100 font-light text-lg transition-colors">−</button>
                                <span id="qty-${item.id}" class="w-10 h-10 flex items-center justify-center text-sm font-medium border-x border-gray-300">${item.quantity}</span>
                                <button onclick="changeQuantity(${item.id}, 1)" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100 font-light text-lg transition-colors">+</button>
                            </div>
                            <button onclick="removeItem(${item.id})" class="text-xs text-gray-400 hover:text-gray-900 transition-colors uppercase tracking-wider font-medium">
                                삭제
                            </button>
                        </div>
                    </div>
                    <div class="text-right flex-shrink-0 pt-2">
                        <p class="text-base font-light text-gray-900">${formatPrice(subtotal)}원</p>
                    </div>
                </div>`;
            }).join('');

            updateSelection();
        }

        function getSelectedIds() {
            return Array.from(document.querySelectorAll('.cart-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
        }

        function updateSelection() {
            const checkboxes = document.querySelectorAll('.cart-checkbox');
            const checked = document.querySelectorAll('.cart-checkbox:checked');
            const selectAll = document.getElementById('select-all');
            selectAll.checked = checkboxes.length > 0 && checked.length === checkboxes.length;

            let totalPrice = 0;
            checked.forEach(cb => {
                totalPrice += parseInt(cb.dataset.price) * parseInt(cb.dataset.quantity);
            });

            document.getElementById('cart-total').textContent = formatPrice(totalPrice) + '원';
            document.getElementById('cart-subtotal').textContent = formatPrice(totalPrice) + '원';
            document.getElementById('selected-count').textContent = `${checked.length}/${checkboxes.length}개 선택`;

            const btnOrder = document.getElementById('btn-order');
            if (checked.length === 0) {
                btnOrder.classList.add('opacity-40', 'pointer-events-none');
            } else {
                btnOrder.classList.remove('opacity-40', 'pointer-events-none');
            }
        }

        function toggleSelectAll() {
            const checked = document.getElementById('select-all').checked;
            document.querySelectorAll('.cart-checkbox').forEach(cb => cb.checked = checked);
            updateSelection();
        }

        async function changeQuantity(cartItemId, delta) {
            const qtyEl = document.getElementById('qty-' + cartItemId);
            const newQty = parseInt(qtyEl.textContent) + delta;
            if (newQty < 1) {
                showConfirm('이 상품을 삭제하시겠습니까?', async () => { await removeItem(cartItemId); });
                return;
            }
            try {
                await apiFetch(`/api/cart/items/${cartItemId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ quantity: newQty })
                });
                loadCart();
            } catch (e) { showToast(e.message, 'danger'); }
        }

        async function removeItem(cartItemId) {
            try {
                await apiFetch(`/api/cart/items/${cartItemId}`, { method: 'DELETE' });
                loadCart();
            } catch (e) { showToast(e.message, 'danger'); }
        }

        function goToCheckout(e) {
            e.preventDefault();
            const selectedIds = getSelectedIds();
            if (selectedIds.length === 0) {
                showToast('주문할 상품을 선택해주세요', 'warning');
                return;
            }
            const params = selectedIds.map(id => 'cartItemIds=' + id).join('&');
            window.location.href = '/checkout?' + params;
        }

    </script>
</body>
</html>
