<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/default :: head('주문 완료')}" />
</head>
<body class="font-sans bg-white text-sf-black min-h-screen flex flex-col">
    <th:block th:replace="~{layout/default :: header}" />

    <main class="flex-1">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 py-20 text-center">

            <div id="complete-loading" class="py-24">
                <div class="spinner-dark mx-auto"></div>
            </div>

            <div id="complete-content" class="hidden">
                <div class="animate-bounce-in mb-12">
                    <div class="w-28 h-28 bg-black rounded-full flex items-center justify-center mx-auto border-4 border-gray-200">
                        <i class="ri-check-line text-6xl text-white font-light"></i>
                    </div>
                </div>

                <h1 class="text-5xl font-light text-gray-900 mb-4 animate-fade-in tracking-widest uppercase letter-spacing-2">주문 완료</h1>
                <p class="text-sm text-gray-600 mb-12 animate-fade-in uppercase tracking-widest font-medium">구매해 주셔서 감사합니다</p>

                <div class="bg-white border border-gray-200 p-10 mb-12 animate-scale-in">
                    <div id="order-details" class="space-y-6 text-left"></div>
                </div>

                <div class="border border-gray-200 p-8 mb-12 animate-fade-in text-left">
                    <h2 class="text-xs font-semibold text-gray-900 mb-8 uppercase tracking-widest">다음 안내</h2>
                    <ul class="space-y-6">
                        <li class="flex items-start gap-4">
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-black text-white text-sm font-light flex-shrink-0 mt-0.5">1</span>
                            <span class="text-sm text-gray-600 pt-0.5">주문 확인 이메일이 발송되었습니다</span>
                        </li>
                        <li class="flex items-start gap-4">
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-black text-white text-sm font-light flex-shrink-0 mt-0.5">2</span>
                            <span class="text-sm text-gray-600 pt-0.5">주문하신 상품은 1~2 영업일 내 정성껏 포장하여 발송됩니다</span>
                        </li>
                        <li class="flex items-start gap-4">
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-black text-white text-sm font-light flex-shrink-0 mt-0.5">3</span>
                            <span class="text-sm text-gray-600 pt-0.5">주문내역에서 언제든지 배송 현황을 확인하실 수 있습니다</span>
                        </li>
                    </ul>
                </div>

                <div class="flex gap-4 animate-fade-in">
                    <a href="/orders" class="flex-1 bg-black hover:bg-gray-900 text-white font-light py-4 text-sm transition-all duration-300 uppercase tracking-widest letter-spacing-1">
                        주문내역 보기
                    </a>
                    <a href="/" class="flex-1 border border-gray-300 text-gray-900 hover:bg-gray-50 font-light py-4 text-sm transition-colors uppercase tracking-widest letter-spacing-1">
                        쇼핑 계속하기
                    </a>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout/default :: footer}" />
    <th:block th:replace="~{layout/default :: scripts}" />

    <script>
        document.addEventListener('DOMContentLoaded', loadComplete);

        async function loadComplete() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');

            if (!orderId) {
                document.getElementById('complete-loading').innerHTML =
                    '<p class="text-gray-500 text-sm">주문 정보가 없습니다</p>';
                return;
            }

            try {
                const order = await apiFetch(`/api/orders/${orderId}`);

                const details = document.getElementById('order-details');
                details.innerHTML = `
                    <div class="flex justify-between pb-6 border-b border-gray-200">
                        <span class="text-sm text-gray-600">주문번호</span>
                        <span class="font-mono font-medium text-gray-900 text-sm">${order.orderId}</span>
                    </div>
                    <div class="flex justify-between pb-6 border-b border-gray-200">
                        <span class="text-sm text-gray-600">주문일시</span>
                        <span class="text-sm text-gray-900">${new Date(order.createdAt).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                    </div>
                    <div class="flex justify-between pb-6 border-b border-gray-200">
                        <span class="text-sm text-gray-600">주문상품</span>
                        <span class="text-sm text-gray-900">${order.orderName}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-sm font-medium text-gray-900 uppercase tracking-wider">총 결제금액</span>
                        <span class="text-lg font-light text-gray-900">${formatPrice(order.totalPrice)}원</span>
                    </div>
                `;

                document.getElementById('complete-loading').classList.add('hidden');
                document.getElementById('complete-content').classList.remove('hidden');

            } catch (e) {
                document.getElementById('complete-loading').innerHTML =
                    '<p class="text-gray-500 text-sm">주문 정보를 불러올 수 없습니다</p>';
            }
        }
    </script>
</body>
</html>
