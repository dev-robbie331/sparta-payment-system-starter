<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/default :: head('주문서')}" />
</head>
<body class="font-sans bg-white text-sf-black min-h-screen flex flex-col">
    <th:block th:replace="~{layout/default :: header}" />

    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-8 py-16">

            <h1 class="text-5xl font-light text-gray-900 mb-12 tracking-widest uppercase letter-spacing-2">주문서</h1>

            <div id="checkout-loading" class="text-center py-24">
                <div class="spinner-dark mx-auto"></div>
            </div>

            <div id="checkout-content" class="hidden animate-fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <div class="lg:col-span-2">
                        <div class="mb-16">
                            <h2 class="text-xs font-semibold text-gray-900 mb-8 uppercase tracking-widest">주문 상품</h2>
                            <div id="checkout-items" class="border-b border-gray-200 pb-8"></div>
                        </div>

                        <div class="mb-16">
                            <h2 class="text-xs font-semibold text-gray-900 mb-8 uppercase tracking-widest">배송 정보</h2>
                            <div class="border border-gray-200 p-6">
                                <p class="text-sm text-gray-600 mb-2">일반 배송</p>
                                <p class="text-xs text-gray-500 font-medium">예상 배송일: 영업일 기준 5~7일</p>
                                <p class="text-xs text-gray-500 font-medium mt-1">전 주문 무료배송</p>
                            </div>
                        </div>

                        <div>
                            <h2 class="text-xs font-semibold text-gray-900 mb-8 uppercase tracking-widest">결제 수단</h2>
                            <div class="border border-gray-200 p-6 flex items-center gap-4">
                                <i class="ri-bank-card-line text-2xl text-gray-400"></i>
                                <div>
                                    <p class="text-sm font-medium text-gray-900">신용카드 / 체크카드</p>
                                    <p class="text-xs text-gray-500 mt-1">PortOne 안전결제</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="sticky top-32">
                            <div class="bg-white border border-gray-200 p-8">
                                <h2 class="text-xs font-semibold text-gray-900 mb-8 uppercase tracking-widest">결제 금액</h2>

                                <div class="space-y-4 mb-8 pb-8 border-b border-gray-200">
                                    <div class="flex justify-between text-sm">
                                        <span class="text-gray-600">상품금액</span>
                                        <span id="checkout-subtotal" class="text-gray-900">0</span>
                                    </div>
                                    <div class="flex justify-between text-sm">
                                        <span class="text-gray-600">배송비</span>
                                        <span class="text-gray-900">무료</span>
                                    </div>
                                    <div class="flex justify-between text-sm">
                                        <span class="text-gray-600">부가세</span>
                                        <span class="text-gray-900">포함</span>
                                    </div>
                                </div>

                                <div class="flex justify-between mb-8">
                                    <span class="text-sm font-medium text-gray-900 uppercase tracking-wide">합계</span>
                                    <span class="text-xl font-light text-gray-900">
                                        <span id="checkout-total">0</span>
                                    </span>
                                </div>

                                <button onclick="startPayment()" id="btn-pay"
                                        class="w-full bg-black hover:bg-gray-900 text-white font-light py-4 text-sm mb-4 transition-all duration-300 uppercase tracking-widest letter-spacing-1">
                                    결제하기
                                </button>
                                <a href="/cart" class="block text-center text-xs text-gray-500 hover:text-gray-900 transition-colors py-3 uppercase tracking-wider font-medium">
                                    장바구니로 돌아가기
                                </a>

                                <div class="text-center mt-8 pt-6 border-t border-gray-200">
                                    <p class="text-xs text-gray-500 flex items-center justify-center gap-2">
                                        <i class="ri-shield-check-line text-sm"></i> 안전결제
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <th:block th:replace="~{layout/default :: footer}" />
    <th:block th:replace="~{layout/default :: scripts}" />

    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
        let checkoutData = null;
        let portoneConfig = null;

        function getCartItemIds() {
            const params = new URLSearchParams(window.location.search);
            return params.getAll('cartItemIds').map(Number).filter(n => !isNaN(n));
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!requireAuth()) return;
            loadCheckout();
        });

        async function loadCheckout() {
            try {
                const cartItemIds = getCartItemIds();
                const checkoutUrl = cartItemIds.length > 0
                    ? '/api/orders/checkout?' + cartItemIds.map(id => 'cartItemIds=' + id).join('&')
                    : '/api/orders/checkout';

                const [config, checkout] = await Promise.allSettled([
                    apiFetch('/api/config/portone'),
                    apiFetch(checkoutUrl)
                ]);

                if (checkout.status === 'rejected') throw checkout.reason;

                portoneConfig = config.status === 'fulfilled' ? config.value : null;
                checkoutData = checkout.value;

                const itemsContainer = document.getElementById('checkout-items');
                itemsContainer.innerHTML = checkoutData.items.map(item => `
                    <div class="py-6 flex gap-6 border-b border-gray-200 last:border-0">
                        <div class="w-24 h-32 rounded-sm flex-shrink-0 flex items-center justify-center border border-gray-200 bg-gradient-to-br ${getProductVisual(item.productName).bg}">
                            <i class="${getProductVisual(item.productName).icon} text-2xl ${getProductVisual(item.productName).color}"></i>
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-900 tracking-tight">${item.productName}</p>
                                <p class="text-xs text-gray-500 mt-2">수량: ${item.quantity}</p>
                            </div>
                            <p class="text-base font-light text-gray-900">${formatPrice(item.subtotal)}원</p>
                        </div>
                    </div>
                `).join('');

                const total = formatPrice(checkoutData.totalPrice) + '원';
                document.getElementById('checkout-total').textContent = total;
                document.getElementById('checkout-subtotal').textContent = total;

                document.getElementById('checkout-loading').classList.add('hidden');
                document.getElementById('checkout-content').classList.remove('hidden');

            } catch (e) {
                showToast('주문서를 불러올 수 없습니다. 주문내역으로 이동합니다', 'warning');
                setTimeout(() => { window.location.href = '/orders'; }, 1500);
            }
        }

        async function startPayment() {
            if (!checkoutData) return;
            if (!portoneConfig) {
                showToast('결제 설정이 아직 준비되지 않았습니다', 'warning');
                return;
            }

            const btn = document.getElementById('btn-pay');
            const originalHTML = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '처리 중...';

            try {
                const cartItemIds = getCartItemIds();
                const orderBody = cartItemIds.length > 0 ? { cartItemIds } : {};
                const orderRes = await apiFetch('/api/orders/checkout', {
                    method: 'POST',
                    body: JSON.stringify(orderBody)
                });

                btn.innerHTML = '결제창 여는 중...';

                const member = await refreshMember();
                const customer = {};
                if (member) {
                    if (member.name) customer.fullName = member.name;
                    if (member.email) customer.email = member.email;
                    if (member.phoneNumber) customer.phoneNumber = member.phoneNumber;
                }

                const payResponse = await PortOne.requestPayment({
                    storeId: portoneConfig.storeId,
                    channelKey: portoneConfig.channelKey,
                    paymentId: orderRes.portonePaymentId,
                    orderName: orderRes.orderName,
                    totalAmount: orderRes.totalPrice,
                    currency: 'KRW',
                    payMethod: 'CARD',
                    customer: customer,
                });

                if (payResponse.code === undefined) {
                    btn.innerHTML = '결제 확인 중...';

                    await apiFetch('/api/payments/confirm', {
                        method: 'POST',
                        body: JSON.stringify({
                            orderId: orderRes.orderId,
                            portonePaymentId: payResponse.paymentId
                        })
                    });

                    window.location.href = '/orders/complete?orderId=' + orderRes.orderId;

                } else {
                    showToast('결제가 취소되었습니다. 주문내역에서 확인해주세요', 'warning');
                    setTimeout(() => { window.location.href = '/orders'; }, 1500);
                }

            } catch (error) {
                showToast('결제 오류: ' + error.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }
    </script>
</body>
</html>
