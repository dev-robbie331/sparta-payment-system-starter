<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{layout/default :: head('주문내역')}" />
</head>
<body class="font-sans bg-white text-sf-black min-h-screen flex flex-col">
    <th:block th:replace="~{layout/default :: header}" />

    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-8 py-16">

            <h1 class="text-5xl font-light text-gray-900 mb-12 tracking-widest uppercase letter-spacing-2">주문내역</h1>

            <div id="orders-loading" class="text-center py-24">
                <div class="spinner-dark mx-auto"></div>
            </div>

            <div id="orders-empty" class="hidden text-center py-32 animate-fade-in">
                <div class="w-24 h-24 mx-auto mb-8 flex items-center justify-center">
                    <i class="ri-file-list-3-line text-6xl text-gray-200"></i>
                </div>
                <h2 class="text-2xl font-light text-gray-900 mb-3 tracking-tight">주문 내역이 없습니다</h2>
                <p class="text-sm text-gray-500 mb-10">쇼핑을 시작하고 첫 주문을 만들어보세요</p>
                <a href="/" class="inline-block text-xs font-medium text-gray-900 border-b border-gray-400 hover:border-gray-900 pb-1 transition-all uppercase tracking-wider">
                    쇼핑 계속하기
                </a>
            </div>

            <div id="orders-content" class="hidden space-y-5"></div>
        </div>
    </main>

    <th:block th:replace="~{layout/default :: footer}" />
    <th:block th:replace="~{layout/default :: scripts}" />

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!requireAuth()) return;
            loadOrders();
        });

        const statusConfig = {
            PENDING_PAYMENT: { label: '결제 대기', color: 'text-amber-600 bg-amber-50' },
            CONFIRMED: { label: '주문 확정', color: 'text-emerald-600 bg-emerald-50' },
            CANCELLED: { label: '취소됨', color: 'text-gray-600 bg-gray-100' }
        };

        async function loadOrders() {
            try {
                const orders = await apiFetch('/api/orders');
                document.getElementById('orders-loading').classList.add('hidden');

                if (!orders || orders.length === 0) {
                    document.getElementById('orders-empty').classList.remove('hidden');
                    return;
                }

                const container = document.getElementById('orders-content');
                container.innerHTML = orders.map((order, index) => {
                    const sc = statusConfig[order.status] || statusConfig.PENDING_PAYMENT;
                    const orderDate = new Date(order.createdAt).toLocaleDateString('ko-KR', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    const itemsHtml = (order.orderItems || []).map(item => `
                        <tr class="border-t border-gray-100 text-sm">
                            <td class="py-4 pr-4 text-gray-900">${item.productName}</td>
                            <td class="py-4 pr-4 text-right text-gray-600">${item.quantity}</td>
                            <td class="py-4 text-right text-gray-900 font-light">${formatPrice(item.orderPrice * item.quantity)}원</td>
                        </tr>
                    `).join('');

                    let actionHtml = '';
                    if (order.status === 'PENDING_PAYMENT') {
                        actionHtml = `<span class="text-xs font-medium text-gray-400 uppercase tracking-wider">결제 미완료 주문</span>`;
                    } else if (order.status === 'CONFIRMED') {
                        actionHtml = `<button onclick="cancelOrder('${order.paymentId}')" class="text-xs font-medium text-red-600 hover:text-red-700 uppercase tracking-wider">주문 취소</button>`;
                    }

                    return `
                    <div class="border border-gray-200 overflow-hidden animate-fade-in" style="animation-delay: ${index * 0.05}s">
                        <div class="px-8 py-6 bg-white flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors border-b border-gray-200" onclick="toggleOrder(${index})">
                            <div class="flex-1 flex items-start gap-8">
                                <div>
                                    <a href="/orders/${order.orderId}" class="text-sm font-mono font-medium text-gray-900 hover:underline" onclick="event.stopPropagation()">#${order.orderId}</a>
                                    <p class="text-xs text-gray-500 mt-2">${orderDate}</p>
                                </div>
                                <span class="${sc.color} px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">${sc.label}</span>
                            </div>
                            <div class="flex items-center gap-6">
                                <p class="text-sm font-light text-gray-900 whitespace-nowrap">${formatPrice(order.totalPrice)}원</p>
                                <i class="ri-chevron-down-line text-gray-400 transition-transform text-lg" id="arrow-${index}"></i>
                            </div>
                        </div>
                        <div id="order-detail-${index}" class="hidden">
                            <div class="px-8 py-8 bg-gray-50">
                                <table class="w-full text-sm">
                                    <thead>
                                        <tr class="border-b border-gray-200">
                                            <th class="text-left py-3 pr-4 font-medium text-gray-900 text-xs uppercase tracking-wider">상품</th>
                                            <th class="text-right py-3 pr-4 font-medium text-gray-900 text-xs uppercase tracking-wider">수량</th>
                                            <th class="text-right py-3 font-medium text-gray-900 text-xs uppercase tracking-wider">금액</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${itemsHtml}
                                    </tbody>
                                </table>
                            </div>
                            <div class="px-8 py-6 bg-white border-t border-gray-200 flex items-center justify-between">
                                <div class="flex items-center gap-6">
                                    <a href="/orders/${order.orderId}" class="text-xs font-medium text-gray-900 border-b border-gray-300 hover:border-gray-900 uppercase tracking-wider">상세보기</a>
                                    ${actionHtml}
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-gray-500 mb-2 uppercase tracking-wider font-medium">주문 합계</p>
                                    <p class="text-lg font-light text-gray-900">${formatPrice(order.totalPrice)}원</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                container.classList.remove('hidden');

            } catch (e) {
                document.getElementById('orders-loading').classList.add('hidden');
                showToast('주문내역을 불러올 수 없습니다', 'danger');
            }
        }

        function toggleOrder(index) {
            const detail = document.getElementById('order-detail-' + index);
            const arrow = document.getElementById('arrow-' + index);
            detail.classList.toggle('hidden');
            arrow.style.transform = detail.classList.contains('hidden') ? '' : 'rotate(180deg)';
        }

        function cancelOrder(paymentId) {
            showConfirm('이 주문을 취소하시겠습니까? 결제 금액이 환불됩니다.', async () => {
                try {
                    await apiFetch(`/api/payments/${paymentId}/cancel`, {
                        method: 'POST',
                        body: JSON.stringify({ reason: '사용자 요청 취소' })
                    });
                    showToast('주문이 취소되었습니다', 'success');
                    loadOrders();
                } catch (e) {
                    showToast('취소 실패: ' + e.message, 'danger');
                }
            });
        }
    </script>
</body>
</html>
